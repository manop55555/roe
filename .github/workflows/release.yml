name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and publish (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux-x86_64
            runner: ubuntu-24.04
            package: tar.gz
          - artifact: linux-aarch64
            runner: ubuntu-24.04-arm
            package: tar.gz
          - artifact: linux-arm
            runner: ubuntu-24.04
            package: tar.gz
            cc: arm-linux-gnueabihf-gcc
            cxx: arm-linux-gnueabihf-g++
            apt: g++-arm-linux-gnueabihf
          - artifact: linux-riscv64
            runner: ubuntu-24.04
            package: tar.gz
            cc: riscv64-linux-gnu-gcc
            cxx: riscv64-linux-gnu-g++
            apt: g++-riscv64-linux-gnu
          - artifact: darwin-x86_64
            runner: macos-13
            package: tar.gz
          - artifact: darwin-aarch64
            runner: macos-14
            package: tar.gz
          - artifact: windows-x86_64
            runner: windows-2022
            package: zip
          - artifact: windows-aarch64
            runner: windows-11-arm
            package: zip
          - artifact: freebsd-x86_64
            runner: ubuntu-24.04
            package: tar.gz
            freebsd: true
    steps:
      # install.sh fetches assets named roe-<version>-<os>-<arch>.<ext> with NO 'v'
      # prefix, os in {linux,darwin}, arch in {x86_64,aarch64,arm,riscv64}. Keep the
      # artifact labels and this version string in sync with install.sh.
      - name: Resolve ref and version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ref="${{ inputs.tag }}"
          else
            ref="${{ github.ref_name }}"
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.ref }}
      - name: Install Linux dependencies
        if: runner.os == 'Linux' && matrix.freebsd != true
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ pkg-config libcapstone-dev ${{ matrix.apt }}
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install capstone ninja
      - name: Configure
        if: matrix.freebsd != true
        shell: bash
        run: |
          if [ -n "${{ matrix.cc }}" ]; then
            export CC="${{ matrix.cc }}"
            export CXX="${{ matrix.cxx }}"
          fi
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DROE_BUILD_TESTS=OFF
      - name: Build
        if: matrix.freebsd != true
        run: cmake --build build
      - name: Install image
        if: matrix.freebsd != true
        shell: bash
        run: |
          cmake --install build --prefix "$PWD/dist/roe" --strip
      - name: Build FreeBSD artifact
        if: matrix.freebsd == true
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y cmake ninja capstone pkgconf
          run: |
            cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DROE_BUILD_TESTS=OFF
            cmake --build build
            cmake --install build --prefix "$PWD/dist/roe" --strip
      - name: Package tarball
        if: matrix.package == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar -czf "../roe-${{ steps.ver.outputs.version }}-${{ matrix.artifact }}.tar.gz" roe
      - name: Package zip
        if: matrix.package == 'zip'
        shell: pwsh
        run: Compress-Archive -Path dist/roe/* -DestinationPath "roe-${{ steps.ver.outputs.version }}-${{ matrix.artifact }}.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: roe-${{ steps.ver.outputs.version }}-${{ matrix.artifact }}
          path: |
            roe-${{ steps.ver.outputs.version }}-${{ matrix.artifact }}.tar.gz
            roe-${{ steps.ver.outputs.version }}-${{ matrix.artifact }}.zip
          if-no-files-found: error

  publish:
    needs: build
    # Run even if some matrix legs failed, so the release still gets whatever built.
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve ref
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Checksums
        shell: bash
        run: |
          cd artifacts
          shopt -s nullglob
          assets=( *.tar.gz *.zip )
          # install.sh downloads "<asset>.sha256" and runs `sha256sum -c` on it, so the
          # checksum file must contain the BARE asset filename.
          for f in "${assets[@]}"; do
            sha256sum "$f" > "${f}.sha256"
          done
          if [ ${#assets[@]} -gt 0 ]; then
            sha256sum "${assets[@]}" > SHA256SUMS
          fi
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.ref }}
          files: artifacts/*
          generate_release_notes: true
