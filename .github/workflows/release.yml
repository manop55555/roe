name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux-x86_64
            runner: ubuntu-24.04
            package: tar.gz
          - artifact: linux-aarch64
            runner: ubuntu-24.04-arm
            package: tar.gz
          - artifact: linux-armv7
            runner: ubuntu-24.04
            package: tar.gz
            cc: arm-linux-gnueabihf-gcc
            cxx: arm-linux-gnueabihf-g++
            apt: g++-arm-linux-gnueabihf
          - artifact: linux-riscv64
            runner: ubuntu-24.04
            package: tar.gz
            cc: riscv64-linux-gnu-gcc
            cxx: riscv64-linux-gnu-g++
            apt: g++-riscv64-linux-gnu
          - artifact: macos-x86_64
            runner: macos-13
            package: tar.gz
          - artifact: macos-aarch64
            runner: macos-14
            package: tar.gz
          - artifact: windows-x86_64
            runner: windows-2022
            package: zip
          - artifact: windows-aarch64
            runner: windows-11-arm
            package: zip
          - artifact: freebsd-x86_64
            runner: ubuntu-24.04
            package: tar.gz
            freebsd: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux' && matrix.freebsd != true
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ pkg-config libcapstone-dev ${{ matrix.apt }}
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install capstone ninja
      - name: Configure
        if: matrix.freebsd != true
        shell: bash
        run: |
          if [ -n "${{ matrix.cc }}" ]; then
            export CC="${{ matrix.cc }}"
            export CXX="${{ matrix.cxx }}"
          fi
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DROE_BUILD_TESTS=OFF
      - name: Build
        if: matrix.freebsd != true
        run: cmake --build build
      - name: Install image
        if: matrix.freebsd != true
        shell: bash
        run: |
          cmake --install build --prefix "$PWD/dist/roe" --strip
      - name: Build FreeBSD artifact
        if: matrix.freebsd == true
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y cmake ninja capstone pkgconf
          run: |
            cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DROE_BUILD_TESTS=OFF
            cmake --build build
            cmake --install build --prefix "$PWD/dist/roe" --strip
      - name: Package tarball
        if: matrix.package == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar -czf "../roe-${{ github.ref_name }}-${{ matrix.artifact }}.tar.gz" roe
      - name: Package zip
        if: matrix.package == 'zip'
        shell: pwsh
        run: Compress-Archive -Path dist/roe/* -DestinationPath "roe-${{ github.ref_name }}-${{ matrix.artifact }}.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: roe-${{ github.ref_name }}-${{ matrix.artifact }}
          path: |
            roe-${{ github.ref_name }}-${{ matrix.artifact }}.tar.gz
            roe-${{ github.ref_name }}-${{ matrix.artifact }}.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
