name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and publish (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

# Prebuilt binaries ship for Linux x86_64 and aarch64. install.sh advertises
# exactly these targets; keep the two in sync. Other platforms build from source
# (see the README) — the distro Capstone is 4.0.2 and lacks capstone/riscv.h, and
# cross/macOS/Windows Capstone-5 provisioning is out of scope for the prebuilt set.
jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: linux-x86_64
            runner: ubuntu-24.04
          - artifact: linux-aarch64
            runner: ubuntu-24.04-arm
    steps:
      # install.sh fetches roe-<version>-<os>-<arch>.tar.gz with NO leading 'v'.
      - name: Resolve ref and version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ref="${{ inputs.tag }}"
          else
            ref="${{ github.ref_name }}"
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.ref }}
      # roe requires Capstone >= 5 (it uses the RISC-V decoder headers). The distro
      # package is too old / lacks capstone/riscv.h, so build Capstone 5 from source.
      - name: Install Capstone 5 from source
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ pkg-config git
          git clone --depth 1 --branch 5.0.3 https://github.com/capstone-engine/capstone.git /tmp/capstone
          cmake -S /tmp/capstone -B /tmp/capstone/build -DCMAKE_BUILD_TYPE=Release \
            -DCAPSTONE_BUILD_TESTS=OFF -DCAPSTONE_BUILD_CSTOOL=OFF
          cmake --build /tmp/capstone/build -j
          sudo cmake --install /tmp/capstone/build
          sudo ldconfig
      - name: Show toolchain
        run: pkg-config --modversion capstone
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DROE_BUILD_TESTS=OFF
      - name: Build
        run: cmake --build build
      - name: Install image
        shell: bash
        run: cmake --install build --prefix "$PWD/dist/roe" --strip
      - name: Package tarball
        shell: bash
        run: |
          cd dist
          tar -czf "../roe-${{ steps.ver.outputs.version }}-${{ matrix.artifact }}.tar.gz" roe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: roe-${{ steps.ver.outputs.version }}-${{ matrix.artifact }}
          path: roe-${{ steps.ver.outputs.version }}-${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    # Publish whatever built, even if one leg failed.
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve ref
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Checksums
        shell: bash
        run: |
          cd artifacts
          shopt -s nullglob
          assets=( *.tar.gz )
          # install.sh downloads "<asset>.sha256" and runs `sha256sum -c`, so the
          # checksum file must contain the BARE asset filename.
          for f in "${assets[@]}"; do
            sha256sum "$f" > "${f}.sha256"
          done
          if [ ${#assets[@]} -gt 0 ]; then
            sha256sum "${assets[@]}" > SHA256SUMS
          fi
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.ref }}
          files: artifacts/*
          generate_release_notes: true
