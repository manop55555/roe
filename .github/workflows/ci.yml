name: ci

on:
  push:
  pull_request:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcapstone-dev
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install capstone
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DROE_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: sanitizers (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcapstone-dev
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DROE_BUILD_TESTS=ON -DROE_SANITIZERS=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
