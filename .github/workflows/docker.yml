name: docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/roe
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # GHCR publish is gated OFF (the multi-arch build still runs and is verified).
          # The ghcr.io/manop55555/roe package is bound to a prior repo and denies write_package.
          # To re-enable publishing: (1) delete or relink that package so it binds to this repo,
          # then (2) set repo variable PUBLISH_GHCR=true (Settings > Secrets and variables > Actions).
          push: ${{ github.event_name != 'pull_request' && vars.PUBLISH_GHCR == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
